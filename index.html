<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Calculadora de IMC</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Seu CSS -->
    <link rel="stylesheet" href="EstruturasCondicionaisComCSS.css">
</head>

<body class="bg-light d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow p-4" style="width: 350px;">
        <h2 class="text-center mb-3">Calculadora de IMC</h2>

        <form>
            <div class="mb-2">
                <label class="form-label">Peso (Kg)</label>
                <input type="number" id="v1" class="form-control" placeholder="Ex: 70">
            </div>

            <div class="mb-2">
                <label class="form-label">Altura (M)</label>
                <input type="number" id="v2" class="form-control" placeholder="Ex: 1.75">
            </div>

            <button type="button" class="btn btn-primary w-100 mt-2" onclick="executar()">
                Calcular
            </button>
        </form>

        <div id="resultado" class="resultado alert mt-3 text-center">
            Preencha os dados para ver o resultado
        </div>
    </div>

    <script src="EstruturasCondicionaisComCSS.js"></script>

    <script>
        const executar = () => {
            const peso = Number(document.getElementById("v1").value);
            const altura = Number(document.getElementById("v2").value);

            if (!peso || !altura) {
                alert("Preencha os campos corretamente!");
                return;
            }

            const v_imc = imc(peso, altura);
            const v_sit = situacao(v_imc);

            const resultado = document.getElementById("resultado");

            resultado.innerHTML = `
                <strong>IMC:</strong> ${v_imc.toFixed(2)} <br>
                <strong>Situação:</strong> ${v_sit}
            `;

            // Cores com Bootstrap + fallback do seu CSS
            if (v_imc < 18.5) resultado.className = "resultado alert alert-warning mt-3 text-center";
            else if (v_imc < 25) resultado.className = "resultado alert alert-success mt-3 text-center";
            else if (v_imc < 30) resultado.className = "resultado alert alert-orange mt-3 text-center";
            else resultado.className = "resultado alert alert-danger mt-3 text-center";
        }
    </script>

</body>
</html>
